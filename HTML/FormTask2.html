<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend style="font-size: x-large;">
            <strong>Applicant Details</strong> 
        </legend>

        <form>
            <br>
            <label for="firstname">First Name</label>
            <input type="text" id="firstname" name="firstName" >
            <br><br>

             <label for="lastname">Last Name</label>
            <input type="text" id="lastname" name="lastName" >
            <br><br>

            <label for="email" >Email&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
            <input type="email" id="email" name="email">
            <br><br>

            <label for="gender">Gender</label><br><br>
            Male<input type="radio" id="gender" name="gender" value="Male"><br>
            Female<input type="radio" id="gender" name="gender" value="Female">
            <br><br>

            <label for="phone">Contact&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
            <input type="text" id="phone" name="contact" pattern="\d{10}">
            <br><br>

            <label for="qual">Qualification</label>
            <input type="file" id="qual" name="qualification">
            <br><br>

            <label for="joindate">Joining Date</label>
            <input type="date" id="joindate" name="JoiningDate">
            <br><br>

            <label for="skills">Skills</label>
            <input type="checkbox" id="skills" name="skills" value="JavaScript">JavaScript
            <input type="checkbox" id="skills" name="skills" value="Java">Java
            <br><br>
            <input type="checkbox" id="skills" name="skills" value="React">React
            <input type="checkbox" id="skills" name="skills" value="Express">Express
            <br><br>
            <input type="checkbox" id="skills" name="skills" value="Python">Python
            <input type="checkbox" id="skills" name="skills" value="SQL">SQL
            <br><br>

            <label for="exp">Years of Experience</label>
            <input type="range" id="exp" name="experience" min="0" max="25">
            <br><br>

            <label for="location">Work Location</label>
            <select id="location" name="location">
                <option value="Default">Default</option>
                <option value="abc">abc</option>
                <option value="def">def</option>
                <option value="ghi">ijk</option>
            </select>
            <br><br>

            <label for="address">Address&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
            <input type="text" id="address" name="address">
            <br><br>

            <input type="submit" value="submit">
            <input type="reset" value="reset">
            
        </form>
    </fieldset>
</body>
</html>
